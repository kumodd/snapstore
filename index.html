<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var p = new URLSearchParams(location.search).get('p');
        if (p) history.replaceState(null, null, '/snapstore' + p);
      })();
    </script>

    <!-- SEO -->
    <title>SnapStore — App Store Screenshot & ASO Visual Platform</title>
    <meta name="description" content="Create pixel-accurate App Store screenshots with AI-powered design, team collaboration, and zero data loss. The AppLaunchpad alternative that actually works." />
    <meta name="keywords" content="app store screenshot generator, ASO screenshots, app store optimization, AppLaunchpad alternative, screenshot tool for developers" />
    <link rel="canonical" href="https://snapstore.io" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://snapstore.io" />
    <meta property="og:title" content="SnapStore — App Store Screenshot & ASO Visual Platform" />
    <meta property="og:description" content="Your work always saves. Your exports always work. AI-powered screenshot tool for indie developers." />
    <meta property="og:image" content="https://snapstore.io/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SnapStore — App Store Screenshots with AI" />
    <meta name="twitter:description" content="Pixel-accurate exports · AI copy generation · Team collaboration · Zero data loss." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
